<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Тест кандидата</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f3f4f6;
      margin: 0;
      padding: 20px;
      color: #111827;
    }

    .container {
      max-width: 860px;
      margin: 0 auto;
    }

    .card {
      background: #ffffff;
      padding: 22px;
      border-radius: 14px;
      box-shadow: 0 4px 14px rgba(0,0,0,0.08);
      margin-bottom: 18px;
    }

    input {
      width: 100%;
      padding: 12px;
      margin-top: 10px;
      border: 1px solid #d1d5db;
      border-radius: 8px;
      font-size: 16px;
      box-sizing: border-box;
    }

    button {
      width: 100%;
      padding: 13px;
      margin-top: 16px;
      background: #111827;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      cursor: pointer;
    }

    button:hover {
      background: #000000;
    }

    .timer {
      font-size: 22px;
      font-weight: bold;
      color: #b91c1c;
      margin-bottom: 20px;
    }

    .question {
      padding: 16px;
      border: 1px solid #e5e7eb;
      border-radius: 10px;
      margin-bottom: 16px;
      background: #fafafa;
    }

    label {
      display: block;
      margin: 10px 0;
      line-height: 1.4;
    }

    .warning {
      background: #fff7ed;
      border: 1px solid #fed7aa;
      padding: 12px;
      border-radius: 10px;
      margin-top: 12px;
      font-size: 14px;
    }

    .success {
      color: #15803d;
      font-weight: bold;
    }

    .error {
      color: #b91c1c;
      font-weight: bold;
    }

    .small {
      font-size: 14px;
      color: #4b5563;
    }
  </style>
</head>

<body>
  <div class="container">

    <div class="card" id="startBlock">
      <h1>Тест кандидата</h1>
      <p class="small">Тест: Junior Financial Analyst v1. Время: 10 минут.</p>

      <input id="name" type="text" placeholder="Ваше имя" />
      <input id="email" type="email" placeholder="Email" />
      <input id="phone" type="tel" placeholder="Телефон" />

      <div class="warning">
        Во время теста фиксируется количество уходов со страницы.
      </div>

      <button onclick="startTest()">Начать тест</button>
    </div>

    <div class="card" id="testBlock" style="display:none;">
      <div class="timer">
        Осталось времени: <span id="timer">10:00</span>
      </div>

      <div id="questions"></div>

      <button onclick="finishTest()">Завершить тест</button>
    </div>

    <div class="card" id="resultBlock" style="display:none;">
      <h2>Тест завершён</h2>
      <p id="resultText"></p>
      <p id="sendStatus"></p>
    </div>

  </div>

  <script>
    const GOOGLE_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzr5v4YzlLfKFshWPOFsz7_d1GbBihUm-cCTqwsIOI21_CPFBGSqSjqkc5310BBtlqbWQ/exec";

    const TEST_VERSION = "Junior Financial Analyst v1";

    const questions = [
      {
        topic: "Выручка",
        text: "Что показывает выручка?",
        options: [
          "Все деньги на счёте компании",
          "Доход от продажи товаров или услуг",
          "Чистую прибыль компании",
          "Сумму налогов"
        ],
        correct: 1
      },
      {
        topic: "Прибыль",
        text: "Что такое чистая прибыль?",
        options: [
          "Выручка минус все расходы",
          "Деньги на расчётном счёте",
          "Себестоимость продукции",
          "Кредиторская задолженность"
        ],
        correct: 0
      },
      {
        topic: "Баланс",
        text: "Что показывает баланс?",
        options: [
          "Доходы и расходы за период",
          "Активы, обязательства и капитал",
          "Только движение денег",
          "Только продажи"
        ],
        correct: 1
      },
      {
        topic: "Денежный поток",
        text: "Что такое денежный поток?",
        options: [
          "Бухгалтерская прибыль",
          "Движение денежных средств",
          "План продаж",
          "Маржинальность"
        ],
        correct: 1
      },
      {
        topic: "Маржинальность",
        text: "Маржинальная прибыль считается как:",
        options: [
          "Выручка минус переменные расходы",
          "Выручка минус налоги",
          "Активы минус обязательства",
          "Прибыль плюс амортизация"
        ],
        correct: 0
      },
      {
        topic: "План-факт анализ",
        text: "Что означает план-факт анализ?",
        options: [
          "Сравнение плановых и фактических показателей",
          "Расчёт налогов",
          "Составление договора",
          "Анализ только выручки"
        ],
        correct: 0
      },
      {
        topic: "Прибыль vs деньги",
        text: "Если прибыль есть, но денег на счёте нет, это может означать:",
        options: [
          "Такого быть не может",
          "Деньги могли уйти в дебиторскую задолженность, запасы или инвестиции",
          "Компания точно банкрот",
          "Выручка всегда равна деньгам"
        ],
        correct: 1
      },
      {
        topic: "Точка безубыточности",
        text: "Точка безубыточности показывает:",
        options: [
          "Объём продаж, при котором прибыль равна нулю",
          "Максимальную прибыль",
          "Размер кредита",
          "Ставку налога"
        ],
        correct: 0
      }
    ];

    let timeLeft = 600;
    let timerInterval = null;
    let tabSwitches = 0;
    let testStarted = false;
    let testFinished = false;

    document.addEventListener("visibilitychange", function () {
      if (testStarted && !testFinished && document.hidden) {
        tabSwitches++;
      }
    });

    function startTest() {
      const name = document.getElementById("name").value.trim();
      const email = document.getElementById("email").value.trim();
      const phone = document.getElementById("phone").value.trim();

      if (!name || !email || !phone) {
        alert("Заполните имя, email и телефон.");
        return;
      }

      document.getElementById("startBlock").style.display = "none";
      document.getElementById("testBlock").style.display = "block";

      renderQuestions();

      testStarted = true;
      testFinished = false;

      timerInterval = setInterval(function () {
        timeLeft--;
        updateTimer();

        if (timeLeft <= 0) {
          finishTest();
        }
      }, 1000);
    }

    function updateTimer() {
      const minutes = Math.floor(timeLeft / 60);
      const seconds = timeLeft % 60;

      document.getElementById("timer").textContent =
        minutes + ":" + String(seconds).padStart(2, "0");
    }

    function renderQuestions() {
      const container = document.getElementById("questions");
      container.innerHTML = "";

      questions.forEach(function (question, index) {
        const block = document.createElement("div");
        block.className = "question";

        let html = "<h3>" + (index + 1) + ". " + question.text + "</h3>";

        question.options.forEach(function (option, optionIndex) {
          html += `
            <label>
              <input type="radio" name="q${index}" value="${optionIndex}">
              ${option}
            </label>
          `;
        });

        block.innerHTML = html;
        container.appendChild(block);
      });
    }

    function calculatePenalty(tabSwitches) {
      if (tabSwitches === 0) return 0;
      if (tabSwitches === 1) return 3;
      if (tabSwitches <= 3) return 7;
      return 15;
    }

    function finishTest() {
      if (testFinished) return;

      testFinished = true;
      testStarted = false;

      if (timerInterval) {
        clearInterval(timerInterval);
      }

      let score = 0;
      const answers = [];
      const weakTopicsArray = [];
      const unansweredArray = [];

      questions.forEach(function (question, index) {
        const selected = document.querySelector(`input[name="q${index}"]:checked`);
        const selectedIndex = selected ? Number(selected.value) : null;
        const isUnanswered = selectedIndex === null;
        const isCorrect = selectedIndex === question.correct;

        if (isCorrect) {
          score++;
        } else {
          weakTopicsArray.push(question.topic);
        }

        if (isUnanswered) {
          unansweredArray.push("Q" + (index + 1) + ": " + question.text);
        }

        answers.push({
          number: index + 1,
          topic: question.topic,
          question: question.text,
          selectedAnswer: selectedIndex !== null ? question.options[selectedIndex] : "Нет ответа",
          correctAnswer: question.options[question.correct],
          isCorrect: isCorrect,
          status: isUnanswered ? "Нет ответа" : (isCorrect ? "Верно" : "Неверно")
        });
      });

      const total = questions.length;
      const percent = Math.round((score / total) * 100);

      const penalty = calculatePenalty(tabSwitches);
      const finalScore = Math.max(0, percent - penalty);

      const passStatus = percent >= 70 ? "Прошёл" : "Не прошёл";

      let finalDecision = "Не годен";

      if (percent >= 70 && tabSwitches <= 2) {
        finalDecision = "Годен";
      }

      const weakTopics = [...new Set(weakTopicsArray)].join(", ") || "Нет";
      const unansweredQuestions = unansweredArray.join("; ") || "Нет";

      let txtReport = "";
      txtReport += "ОТЧЁТ ПО ТЕСТУ\n";
      txtReport += "====================\n\n";
      txtReport += "Версия теста: " + TEST_VERSION + "\n";
      txtReport += "Имя: " + document.getElementById("name").value.trim() + "\n";
      txtReport += "Email: " + document.getElementById("email").value.trim() + "\n";
      txtReport += "Телефон: " + document.getElementById("phone").value.trim() + "\n\n";
      txtReport += "Результат: " + score + " из " + total + "\n";
      txtReport += "Процент: " + percent + "%\n";
      txtReport += "Штраф за уходы со вкладки: " + penalty + "\n";
      txtReport += "Итоговый балл: " + finalScore + "\n";
      txtReport += "Статус: " + passStatus + "\n";
      txtReport += "Решение: " + finalDecision + "\n";
      txtReport += "Уходы со вкладки: " + tabSwitches + "\n";
      txtReport += "Слабые темы: " + weakTopics + "\n";
      txtReport += "Неотвеченные вопросы: " + unansweredQuestions + "\n\n";
      txtReport += "ДЕТАЛЬНЫЙ РАЗБОР\n";
      txtReport += "====================\n\n";

      answers.forEach(function (answer) {
        txtReport += "Вопрос " + answer.number + ": " + answer.question + "\n";
        txtReport += "Тема: " + answer.topic + "\n";
        txtReport += "Ответ кандидата: " + answer.selectedAnswer + " - " + answer.status + "\n";

        if (!answer.isCorrect) {
          txtReport += "Правильный ответ: " + answer.correctAnswer + "\n";
        }

        txtReport += "\n";
      });

      let summary = "";

      if (finalScore >= 85 && tabSwitches === 0) {
        summary = "Сильный кандидат. Хорошая база, признаков проблемного прохождения нет.";
      } else if (finalScore >= 70 && tabSwitches <= 2) {
        summary = "Кандидат годен. Есть отдельные пробелы: " + weakTopics + ".";
      } else if (percent >= 70 && tabSwitches > 2) {
        summary = "Знания по баллам приемлемые, но есть риск недобросовестного прохождения из-за уходов со вкладки.";
      } else {
        summary = "Кандидат не годен. Основные пробелы: " + weakTopics + ".";
      }

      if (unansweredQuestions !== "Нет") {
        summary += " Есть вопросы без ответа.";
      }

      document.getElementById("testBlock").style.display = "none";
      document.getElementById("resultBlock").style.display = "block";

      document.getElementById("resultText").innerHTML =
        "Ваш результат: <b>" + score + " из " + total + "</b><br>" +
        "Процент: <b>" + percent + "%</b><br>" +
        "Итоговый балл: <b>" + finalScore + "</b><br>" +
        "Статус: <b>" + passStatus + "</b><br>" +
        "Решение: <b>" + finalDecision + "</b>";

      const resultData = {
        testVersion: TEST_VERSION,
        name: document.getElementById("name").value.trim(),
        email: document.getElementById("email").value.trim(),
        phone: document.getElementById("phone").value.trim(),
        score: score,
        total: total,
        percent: percent,
        finalScore: finalScore,
        passStatus: passStatus,
        finalDecision: finalDecision,
        tabSwitches: tabSwitches,
        weakTopics: weakTopics,
        txtReport: txtReport,
        summary: summary
      };

      sendResult(resultData);
    }

    function sendResult(data) {
      const status = document.getElementById("sendStatus");
      status.textContent = "Отправка результата...";
      status.className = "";

      fetch(GOOGLE_SCRIPT_URL, {
        method: "POST",
        mode: "no-cors",
        body: JSON.stringify(data)
      })
      .then(function () {
        status.textContent = "Результат отправлен.";
        status.className = "success";
      })
      .catch(function () {
        status.textContent = "Результат посчитан, но отправка не удалась.";
        status.className = "error";
      });
    }
  </script>
</body>
</html>
